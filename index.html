<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Iceland trip planner — what are we doing today?">
  <title>Today — Iceland Trip</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="">
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <nav class="nav" aria-label="Main navigation">
    <div class="nav__inner">
      <a href="/" class="nav__brand">Iceland Trip</a>
      <div class="nav__links">
        <a href="/" class="nav__link" data-page="today">Today</a>
        <a href="/journal.html" class="nav__link" data-page="journal">Journal</a>
        <a href="/links.html" class="nav__link" data-page="links">Links</a>
      </div>
    </div>
  </nav>

  <main class="page">
    <div id="page-status" class="container" role="status"></div>

    <section class="hero container" id="hero"></section>

    <div class="container">

      <div class="grid grid-2 section">
        <section class="card" aria-labelledby="itinerary-heading">
          <div class="card__header">
            <h2 class="card__title" id="itinerary-heading">Today's itinerary</h2>
          </div>
          <div id="itinerary"></div>
        </section>

        <section class="card card--map" aria-labelledby="map-heading">
          <div class="card__header">
            <h2 class="card__title" id="map-heading">Today's map</h2>
          </div>
          <div id="map" class="map-container" role="img" aria-label="Map of today's locations"></div>
        </section>
      </div>

      <div class="grid grid-2 section">
        <section class="card" aria-labelledby="weather-heading">
          <div class="card__header">
            <h2 class="card__title" id="weather-heading">Useful Links</h2>
          </div>
          <div class="quick-links">
            <a class="quick-link" href="weather://" target="_blank" rel="noopener noreferrer">
              <span class="quick-link__icon">🌤️</span>
              <span class="quick-link__label">Apple Weather</span>
            </a>
            <a class="quick-link" href="https://www.google.com/maps/search/gas+station+open+now/" target="_blank" rel="noopener noreferrer">
              <span class="quick-link__icon">⛽</span>
              <span class="quick-link__label">Nearby gas stations</span>
            </a>
            <a class="quick-link" href="https://splid.net/j/3P1GRXVDM" target="_blank" rel="noopener noreferrer">
              <span class="quick-link__icon">💸</span>
              <span class="quick-link__label">Splid — expenses</span>
            </a>
            <a class="quick-link" href="https://getbring.onelink.me/ZAzR/72neepkc" target="_blank" rel="noopener noreferrer">
              <span class="quick-link__icon">🛒</span>
              <span class="quick-link__label">Bring — shopping list</span>
            </a>
            <a class="quick-link" href="https://www.google.com/maps/search/Lebensmittelladen+jetzt+ge%C3%B6ffnet/" target="_blank" rel="noopener noreferrer">
              <span class="quick-link__icon">🥦</span>
              <span class="quick-link__label">Nearby grocery shops</span>
            </a>
          </div>
        </section>

        <section class="card" aria-labelledby="meals-heading">
          <div class="card__header">
            <h2 class="card__title" id="meals-heading">Meals</h2>
          </div>
          <div id="meals"></div>
        </section>
      </div>

      <div class="section">
        <section class="card" aria-labelledby="reflection-heading">
          <div class="card__header">
            <h2 class="card__title" id="reflection-heading">Daily Reflection</h2>
          </div>
          <div id="reflection"></div>
        </section>
      </div>

    </div>
  </main>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
  <script type="module" src="/js/today.js"></script>
</body>
</html>
